name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        run: rustup toolchain install 1.95.0 --profile minimal

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Format check
        run: cargo fmt --all --check

      - name: Check
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Validate content
        run: cargo run -p langindex-site -- validate-content

      - name: Test
        run: cargo test --workspace --all-features

      - name: Build
        run: cargo build -p langindex-site --release

      - name: Check internal links
        run: |
          cargo test -p langindex-site content::tests::route_manifest_covers_public_content
          cargo run -p langindex-site -- validate-content

      - name: Smoke test
        run: pnpm test:smoke
